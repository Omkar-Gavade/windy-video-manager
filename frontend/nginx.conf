server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache the hashed static assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend container over the compose network.
    # The frontend calls the same origin (/api/...), so no hardcoded backend
    # URL and no CORS. "windy-backend" is the compose service/container name.
    location /api/ {
        proxy_pass http://windy-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Uploads can be large; raise the body cap and read timeouts.
        client_max_body_size 250m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SPA fallback: any non-file route serves index.html so client-side
    # routing works and refreshing /videos or /inputs never 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
